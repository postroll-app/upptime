# PostRoll status page — Upptime configuration.
#
# This file is the SOURCE COPY. Upptime itself runs from a SEPARATE GitHub repo
# (postroll-app/upptime) so the status page stays up when postroll.app is down — see
# ops/upptime/README.md and docs/STATUS_PAGE.md for the one-time bootstrap.
#
# Copy this file to the root of the postroll-app/upptime repo as `.upptimerc.yml`.
# Full schema: https://upptime.js.org/docs/configuration

owner: postroll-app # ← the GitHub org/user that owns the postroll-app/upptime repo
repo: upptime

# ── What we monitor ──────────────────────────────────────────────────────────
# Public surfaces are pinged at their real URLs; each managed dependency is
# pinged at its /api/status/<slug> endpoint, which returns 200 when healthy and
# 503 when down (see src/app/api/status/[component]/route.ts). A 503 there is an
# intentional per-dependency signal, NOT an app-down alert.
sites:
  - name: Web app
    url: https://postroll.app
  - name: Help docs
    url: https://help.postroll.app
  - name: Realtime / VTT
    url: https://postroll-realtime.fly.dev/_health
  - name: Database
    url: https://postroll.app/api/status/db
  - name: Cache (Redis)
    url: https://postroll.app/api/status/redis
  - name: File storage
    url: https://postroll.app/api/status/r2
  - name: Payments
    url: https://postroll.app/api/status/stripe
  - name: Email
    url: https://postroll.app/api/status/email
  - name: PDF export
    url: https://postroll.app/api/status/pdf

# Owners auto-assigned to the incident issue Upptime opens on downtime.
assignees:
  - Archie-TaB # ← replace with the GitHub handle(s) that should be paged

status-website:
  cname: status.postroll.app
  name: PostRoll Status
  # Brand mark + favicons (served publicly from the app's /public dir).
  logoUrl: https://postroll.app/PostRoll%20Logo/PostRoll_Logo_White_Wide.svg
  faviconSvg: https://postroll.app/favicon/favicon.svg
  favicon: https://postroll.app/favicon/favicon-96x96.png
  introTitle: "PostRoll Status"
  introMessage: >-
    Current and historical uptime for PostRoll's services. Monitored
    independently every 5 minutes from outside our infrastructure, so this page
    stays online even during an outage. Subscribe to a service to get notified.
  navbar:
    - title: Status
      href: /
    - title: Help center
      href: https://help.postroll.app
    - title: PostRoll
      href: https://postroll.app
  # Base theme. Options: light | dark | night | ocean — try each and keep the
  # one closest to the app's dark plum look.
  theme: night
  # Social / share preview + browser theme colour (PostRoll plum).
  metaTags:
    - name: "og:title"
      content: "PostRoll Status"
    - name: "og:description"
      content: "Live and historical uptime for PostRoll's services."
    - name: "theme-color"
      content: "#8b5cf6"

  # ── Optional deeper theming ────────────────────────────────────────────────
  # Uncomment to push closer to the marketing look. The `css` selectors target
  # Upptime's Svelte build, so after the site is live, open it in devtools and
  # confirm the class names before relying on these — treat this as a starting
  # point, not final.
  #
  customHeadHtml: >-
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  css: >-
    :root { --brand-from:#6366f1; --brand-via:#8b5cf6; --brand-to:#d946ef; }
    body, button, input, h1, h2, h3 {
      font-family: 'Geist', system-ui, -apple-system, sans-serif !important;
    }
    /* Gradient wordmark on the intro heading (confirm the selector live). */
    h1 {
      background: linear-gradient(90deg, var(--brand-from), var(--brand-via), var(--brand-to));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    a { color: var(--brand-via); }
